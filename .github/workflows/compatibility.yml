name: Core Compatibility Check

on:
  workflow_dispatch:
    inputs:
      core_version:
        description: "M3Undle.Core package version to test against (e.g. 1.0.0-alpha.7)"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  compatibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Add GitHub Packages source
        run: >
          dotnet nuget update source github
          --username "${{ github.actor }}"
          --password "${{ secrets.GITHUB_TOKEN }}"
          --store-password-in-clear-text

      - name: Restore against candidate Core version
        run: dotnet restore -p:M3UndleCoreVersion=${{ inputs.core_version }}

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:M3UndleCoreVersion=${{ inputs.core_version }}

      - name: Test
        run: dotnet test --no-build --configuration Release -p:M3UndleCoreVersion=${{ inputs.core_version }}
